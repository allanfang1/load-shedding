services:
  redis:
    image: redis:7-alpine
    container_name: loadshedding-redis
    restart: "no"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    cpus: "0.5"
    mem_limit: "512m"
    mem_reservation: "256m"

  producer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loadshedding-producer
    depends_on:
      - redis
    cpus: "0.2"
    mem_limit: "1g"
    mem_reservation: "512m"
    command:
      - python
      - producer_service.py
      - --graph-dir
      - /data/ldbc-sf10-updatestream_postprocess.txt
      - --redis-url
      - redis://redis:6379/0
      - --redis-key
      - edges
      - --send-end-sentinel
      - --max-runtime
      - ${STACK_RUNTIME_SECONDS:-120}
      - --redis-batch-size
      - ${PRODUCER_BATCH_SIZE:-4000}
      - --clear-key-on-start
    volumes:
      - ./data:/data:ro

  main:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loadshedding-main
    depends_on:
      - redis
    cpus: "4.00"
    mem_limit: "3g"
    mem_reservation: "1g"
    command:
      - python
      - main.py
      - --redis-url
      - redis://redis:6379/0
      - --redis-key
      - edges
      - --redis-drain-batch-size
      - ${CONSUMER_DRAIN_BATCH_SIZE:-4000}
      - --output-dir
      - /app/tests/results.csv
      - --k
      - "100"
      - --total-runtime
      - ${STACK_RUNTIME_SECONDS:-120}
      - --window-size
      - "60"
      - --slide
      - "20"
      - --headroom
      - "10"
      # - --model-dir
      # - /app/src/models
    volumes:
      - ./data:/data:ro
      - ./src/models:/app/src/models
      - ./tests:/app/tests

  modelling:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loadshedding-modelling
    profiles:
      - modelling
    cpus: "4.00"
    mem_limit: "3g"
    mem_reservation: "1g"
    command:
      - python
      - -m
      - modelling_s_v2.main
      - --help
    volumes:
      - ./data:/data:ro
      - ./src/models:/app/src/models
      - ./tests:/app/tests
